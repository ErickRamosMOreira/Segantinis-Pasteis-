<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Segantinis Pasteis - Pedidos</title>
<style>
body{font-family:Arial;background:#fff8e1;padding:20px}
h1{color:#d32f2f}
.box{background:#fff;padding:15px;border-radius:10px;margin-top:20px}
.item{margin:10px 0;padding:10px;border-bottom:1px solid #ddd}
button{background:#d32f2f;color:#fff;border:none;padding:8px;border-radius:5px;cursor:pointer}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:1px solid #ccc}
img{width:80px;height:80px;object-fit:cover;border-radius:8px}
.flex{display:flex;justify-content:space-between;align-items:center}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<h1>🍴 Segantinis Pasteis</h1>

<div class="box">
<h2>Cardápio</h2>
<div id="cardapio"></div>
</div>

<div class="box">
<h2>Seus Dados</h2>
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">
<select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>
</div>

<div class="box">
<h2>Carrinho</h2>
<ul id="lista"></ul>
<p><strong>Total: R$ <span id="total">0</span></strong></p>
<button onclick="finalizarPedido()">Enviar Pedido</button>
<button onclick="imprimirComanda()">Imprimir</button>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyAepNKMpg3pxBsYf9dfWAIlWZR6DJClSlw",
authDomain:"segantinis-87159.firebaseapp.com",
databaseURL:"https://segantinis-87159-default-rtdb.firebaseio.com",
projectId:"segantinis-87159"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let carrinho=[];
let total=0;

function carregarCardapio(){
 db.ref('cardapio').on('value',snap=>{
  let div=document.getElementById('cardapio');
  div.innerHTML='';

  snap.forEach(c=>{
   let item=c.val();

   div.innerHTML+=`
   <div class="item">
     <div class="flex">
       <div>
         <b>${item.nome}</b><br>
         R$ ${item.preco}
       </div>
       ${item.img?`<img src="${item.img}">`:''}
     </div>
     <button onclick="addItem('${item.nome}',${item.preco})">Adicionar</button>
   </div>`;
  });
 });
}

function addItem(nome,preco){
 carrinho.push({nome,preco});
 total+=parseFloat(preco);
 atualizarTela();
}

function atualizarTela(){
 let lista=document.getElementById('lista');
 lista.innerHTML='';

 carrinho.forEach(i=>{
  lista.innerHTML+=`<li>${i.nome} - R$ ${i.preco}</li>`;
 });

 document.getElementById('total').innerText=total.toFixed(2);
}

function gerarTextoPedido(){
 let nome=document.getElementById('nome').value;
 let telefone=document.getElementById('telefone').value;
 let endereco=document.getElementById('endereco').value;
 let pagamento=document.getElementById('pagamento').value;

 let texto=`Segantinis Pasteis\n\nCliente: ${nome}\nTel: ${telefone}\nEnd: ${endereco}\n\nPedido:\n`;

 carrinho.forEach(i=>{
  texto+=`- ${i.nome} (R$ ${i.preco})\n`;
 });

 texto+=`\nTotal: R$ ${total}\nPagamento: ${pagamento}`;

 return texto;
}

function finalizarPedido(){
 let pedido=gerarTextoPedido();
 let numero='5518999999999';
 let url=`https://wa.me/${numero}?text=${encodeURIComponent(pedido)}`;
 window.open(url,'_blank');
}

function imprimirComanda(){
 let pedido=gerarTextoPedido();
 let w=window.open('','','width=300,height=600');
 w.document.write('<pre>'+pedido+'</pre>');
 w.print();
}

carregarCardapio();
</script>

</body>
</html>
