<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin - Segantinis</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.login, .painel{max-width:400px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input{width:100%;padding:8px;margin:5px 0}
button{background:#d32f2f;color:#fff;border:none;padding:8px;border-radius:5px;cursor:pointer}
.item{display:flex;justify-content:space-between;margin:5px 0;padding:5px;background:#eee;border-radius:5px}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="login" id="loginBox">
<h2>Login Admin</h2>
<input id="user" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div class="painel" id="painel" style="display:none">
<h2>Painel Administrativo</h2>

<h3>Adicionar Item</h3>
<input id="nomeItem" placeholder="Nome">
<input id="precoItem" placeholder="Preço">
<button onclick="addItem()">Adicionar</button>

<h3>Itens</h3>
<div id="lista"></div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyAepNKMpg3pxBsYf9dfWAIlWZR6DJClSlw",
authDomain:"segantinis-87159.firebaseapp.com",
databaseURL:"https://segantinis-87159-default-rtdb.firebaseio.com",
projectId:"segantinis-87159"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

// LOGIN SIMPLES
function login(){
let u=document.getElementById('user').value;
let s=document.getElementById('senha').value;

if(u==='admin' && s==='1234'){
 document.getElementById('loginBox').style.display='none';
 document.getElementById('painel').style.display='block';
 carregarItens();
}else{
 alert('Login inválido');
}
}

// ADICIONAR ITEM
function addItem(){
let nome=document.getElementById('nomeItem').value;
let preco=document.getElementById('precoItem').value;

if(!nome || !preco) return alert('Preencha tudo');

 db.ref('cardapio').push({nome,preco});
 document.getElementById('nomeItem').value='';
 document.getElementById('precoItem').value='';
}

// LISTAR ITENS
function carregarItens(){
 let lista=document.getElementById('lista');

 db.ref('cardapio').on('value',snap=>{
  lista.innerHTML='';
  snap.forEach(c=>{
   let id=c.key;
   let item=c.val();

   lista.innerHTML+=`
   <div class="item">
     ${item.nome} - R$${item.preco}
     <button onclick="remover('${id}')">X</button>
   </div>`;
  });
 });
}

// REMOVER
function remover(id){
 db.ref('cardapio/'+id).remove();
}
</script>

</body>
</html>
