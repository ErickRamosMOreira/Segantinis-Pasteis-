<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Segantinis Pasteis - Pedidos</title>
  <style>
    body { font-family: Arial; background: #fff8e1; padding: 20px; }
    h1 { color: #d32f2f; }
    .item { margin: 10px 0; }
    button { background: #d32f2f; color: white; border: none; padding: 8px 12px; cursor: pointer; border-radius: 5px; margin-right:5px; }
    input, select { margin: 5px 0; padding: 8px; width: 100%; border-radius: 5px; border: 1px solid #ccc; }
    .box { background: white; padding: 15px; border-radius: 10px; margin-top: 20px; }
  </style>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<h1>🍴 Segantinis Pasteis</h1>

<div class="box">
  <h2>Cardápio</h2>
  <div class="item">Pastel de Carne - R$ 10 <button onclick="addItem('Pastel de Carne',10)">Adicionar</button></div>
  <div class="item">Pastel de Queijo - R$ 9 <button onclick="addItem('Pastel de Queijo',9)">Adicionar</button></div>
  <div class="item">Refrigerante - R$ 6 <button onclick="addItem('Refrigerante',6)">Adicionar</button></div>
</div>

<div class="box">
  <h2>Seus Dados</h2>
  <input id="nome" placeholder="Nome">
  <input id="telefone" placeholder="Telefone">
  <input id="endereco" placeholder="Endereço">
  <select id="pagamento">
    <option>Pix</option>
    <option>Dinheiro</option>
    <option>Cartão</option>
  </select>
</div>

<div class="box">
  <h2>Carrinho</h2>
  <ul id="lista"></ul>
  <p><strong>Total: R$ <span id="total">0</span></strong></p>
  <button onclick="finalizarPedido()">Enviar Pedido</button>
</div>

<div class="box">
  <h2>Pedidos (Cozinha)</h2>
  <div id="listaPedidos"></div>
</div>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyAepNKMpg3pxBsYf9dfWAIlWZR6DJClSlw",
  authDomain: "segantinis-87159.firebaseapp.com",
  databaseURL: "https://segantinis-87159-default-rtdb.firebaseio.com",
  projectId: "segantinis-87159",
  storageBucket: "segantinis-87159.firebasestorage.app",
  messagingSenderId: "731998263045",
  appId: "1:731998263045:web:06606dbd634adbcddb096c"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// SISTEMA
let carrinho = [];
let total = 0;

function addItem(nome, preco) {
  carrinho.push({nome, preco});
  total += preco;
  atualizarTela();
}

function atualizarTela() {
  let lista = document.getElementById('lista');
  lista.innerHTML = '';

  carrinho.forEach(item => {
    let li = document.createElement('li');
    li.innerText = item.nome + ' - R$ ' + item.preco;
    lista.appendChild(li);
  });

  document.getElementById('total').innerText = total;
}

function finalizarPedido() {
  let nome = document.getElementById('nome').value;
  let telefone = document.getElementById('telefone').value;
  let endereco = document.getElementById('endereco').value;
  let pagamento = document.getElementById('pagamento').value;

  db.ref('pedidos').push({
    nome,
    telefone,
    endereco,
    pagamento,
    carrinho,
    total
  });

  alert('Pedido enviado!');

  // impressão automática
  setTimeout(()=>{
    window.print();
  },1000);

  carrinho = [];
  total = 0;
  atualizarTela();
}

// 🔔 SOM DE PEDIDO
const audio = new Audio('https://www.soundjay.com/buttons/sounds/beep-01a.mp3');

// 🍳 PAINEL COZINHA (AQUI QUE FICAVA A DÚVIDA)
let listaPedidos = document.getElementById('listaPedidos');

db.ref('pedidos').on('value',snap=>{
 listaPedidos.innerHTML='';
 snap.forEach(c=>{
  let p=c.val();
  listaPedidos.innerHTML+=`
  <div style="background:#fff3cd;padding:10px;margin:5px;border-radius:8px">
    <b>${p.nome}</b><br>
    ${p.carrinho.map(i=>i.nome).join(', ')}<br>
    💰 R$${p.total}
  </div>`;
 });
});

// 🔔 TOCA SOM QUANDO CHEGA NOVO PEDIDO
 db.ref('pedidos').on('child_added', snap => {
  audio.play();
});

</script>

</body>
</html>
