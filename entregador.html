<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Entregador - Segantinis</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{background:#fff;padding:15px;border-radius:10px;margin-top:10px}
button{background:#4caf50;color:#fff;border:none;padding:8px;border-radius:5px}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<h1>🛵 Entregas</h1>
<div id="lista"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAepNKMpg3pxBsYf9dfWAIlWZR6DJClSlw",
  authDomain: "segantinis-87159.firebaseapp.com",
  databaseURL: "https://segantinis-87159-default-rtdb.firebaseio.com",
  projectId: "segantinis-87159"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let lista = document.getElementById('lista');

db.ref('pedidos').on('value',snap=>{
 lista.innerHTML='';
 snap.forEach(c=>{
  let id=c.key;
  let p=c.val();

  if(p.status === 'saiu'){
    lista.innerHTML+=`
    <div class="box">
      <b>${p.nome}</b><br>
      📍 ${p.endereco}<br>
      📞 ${p.telefone}<br>
      💰 R$${p.total}<br><br>
      <button onclick="entregar('${id}')">Marcar Entregue</button>
    </div>`;
  }
 });
});

function entregar(id){
 db.ref('pedidos/'+id).update({status:'entregue'});
 alert('Pedido entregue!');
}
</script>

</body>
</html>
