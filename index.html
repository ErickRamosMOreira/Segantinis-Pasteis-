<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Segantinis Pasteis - Sistema Completo</title>
<style>
body{font-family:Arial;background:#fff8e1;padding:20px}
h1{color:#d32f2f}
.box{background:#fff;padding:15px;border-radius:10px;margin-top:20px}
button{background:#d32f2f;color:#fff;border:none;padding:8px;border-radius:5px;cursor:pointer;margin:3px}
.alerta{animation:piscar .5s infinite}

 @keyframes piscar{0%{background:#fff3cd}50%{background:red;color:#fff}100%{background:#fff3cd}}
.status{padding:5px;border-radius:5px;color:#fff;font-size:12px}
.recebido{background:#757575}
.preparando{background:#ff9800}
.saiu{background:#2196f3}
.entregue{background:#4caf50}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<h1>🍴 Segantinis Pasteis</h1>

<div class="box">
<h2>Pedido</h2>
<input id="nome" placeholder="Nome">
<input id="telefone" placeholder="Telefone">
<input id="endereco" placeholder="Endereço">
<select id="pagamento">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>

<button onclick="addItem('Pastel Carne',10)">Carne</button>
<button onclick="addItem('Pastel Queijo',9)">Queijo</button>
<button onclick="addItem('Refri',6)">Refri</button>

<p>Total: R$ <span id="total">0</span></p>
<button onclick="finalizarPedido()">Enviar Pedido</button>
</div>
 <div id="pixBox" style="display:none;margin-top:10px">
  <h3>💳 Pague com Pix</h3>
  <img id="qrcode" width="200">
  <p id="pixCopia"></p>
</div>

<div class="box" id="painelPedidos">
<h2>Pedidos</h2>
<div id="listaPedidos"></div>
</div>

<div class="box">
<h2>💰 Vendas do Dia</h2>
<p>Total: R$ <span id="totalVendas">0</span></p>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyAepNKMpg3pxBsYf9dfWAIlWZR6DJClSlw",
authDomain:"segantinis-87159.firebaseapp.com",
databaseURL:"https://segantinis-87159-default-rtdb.firebaseio.com",
projectId:"segantinis-87159"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let carrinho=[];
let total=0;
let tocando=false;

function addItem(n,p){carrinho.push({nome:n,preco:p});total+=p;document.getElementById('total').innerText=total}

function finalizarPedido(){
let pedido={
nome:document.getElementById('nome').value,
telefone:document.getElementById('telefone').value,
endereco:document.getElementById('endereco').value,
pagamento:document.getElementById('pagamento').value,
carrinho,total,status:'recebido'
};
function gerarPix(total){
  // chave pix (troque pela sua)
  let chave = "SEU_PIX_AQUI";

  let codigo = `00020126360014BR.GOV.BCB.PIX0114${chave}52040000530398654${total}5802BR5920Segantinis Pasteis6009SAO PAULO`;

  document.getElementById('pixBox').style.display = 'block';

  document.getElementById('pixCopia').innerText = codigo;

  document.getElementById('qrcode').src =
  `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${codigo}`;
}
db.ref('pedidos').push(pedido);
alert('Pedido enviado');
window.print();
carrinho=[];total=0;document.getElementById('total').innerText=0;
}
if(pedido.pagamento === 'Pix'){
  gerarPix(pedido.total);
}
// SOM
const audio=new Audio('https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3');

document.body.addEventListener('click',()=>{audio.play().then(()=>{audio.pause();audio.currentTime=0})},{once:true});

function alerta(){
if(tocando)return;
tocando=true;
let i=setInterval(()=>{audio.currentTime=0;audio.play()},2000);
document.body.onclick=()=>{clearInterval(i);tocando=false;painelPedidos.classList.remove('alerta')}
}

let lista=document.getElementById('listaPedidos');
let painelPedidos=document.getElementById('painelPedidos');
let totalVendas=0;

// ATUALIZA
 db.ref('pedidos').on('value',snap=>{
 lista.innerHTML='';
 totalVendas=0;
 snap.forEach(c=>{
 let id=c.key;
 let p=c.val();
 totalVendas+=p.total;
 lista.innerHTML+=`
 <div style="margin:10px;padding:10px;border:1px solid #ccc;border-radius:8px">
 <b>${p.nome}</b><br>
 ${p.carrinho.map(i=>i.nome).join(', ')}<br>
 💰 R$${p.total}<br>
 <span class="status ${p.status}">${p.status}</span><br>
 
 <button onclick="mudarStatus('${id}','preparando')">Preparando</button>
 <button onclick="mudarStatus('${id}','saiu')">Saiu</button>
 <button onclick="mudarStatus('${id}','entregue')">Entregue</button>
 </div>`;
 });
 document.getElementById('totalVendas').innerText=totalVendas;
});

// NOVO PEDIDO
 db.ref('pedidos').on('child_added',()=>{
 alerta();
 painelPedidos.classList.add('alerta');
});

function mudarStatus(id,status){
 db.ref('pedidos/'+id).update({status});
}

</script>
</body>
</html>
