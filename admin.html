<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin - Segantinis</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.login,.painel{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:10px}
input,select{width:100%;padding:8px;margin:5px 0;border-radius:5px;border:1px solid #ccc}
button{background:#d32f2f;color:#fff;border:none;padding:8px;border-radius:5px;cursor:pointer;margin-top:5px}
.item{margin:10px 0;padding:10px;background:#eee;border-radius:8px}
img{width:60px;height:60px;border-radius:5px;object-fit:cover}
.flex{display:flex;justify-content:space-between;align-items:center}
.small{font-size:12px;color:#555}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div class="login" id="loginBox">
<h2>🔐 Login Admin</h2>
<input id="user" placeholder="Usuário">
<input id="senha" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>

<div class="painel" id="painel" style="display:none">
<h2>⚙️ Painel Administrativo</h2>

<h3>➕ Novo Item</h3>
<input id="nomeItem" placeholder="Nome do produto">
<input id="precoItem" placeholder="Preço (ex: 10.00)">
<input id="imgItem" placeholder="URL da imagem">
<select id="categoriaItem">
<option value="Pastel">Pastel</option>
<option value="Bebida">Bebida</option>
<option value="Promo">Promoção</option>
</select>
<button onclick="addItem()">Salvar Item</button>

<h3>📋 Cardápio</h3>
<select id="filtro" onchange="carregarItens()">
<option value="">Todos</option>
<option value="Pastel">Pastel</option>
<option value="Bebida">Bebida</option>
<option value="Promo">Promoção</option>
</select>
<div id="lista"></div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyAepNKMpg3pxBsYf9dfWAIlWZR6DJClSlw",
authDomain:"segantinis-87159.firebaseapp.com",
databaseURL:"https://segantinis-87159-default-rtdb.firebaseio.com",
projectId:"segantinis-87159"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();

function login(){
let u=user.value;
let s=senha.value;
if(u==='admin' && s==='1234'){
 loginBox.style.display='none';
 painel.style.display='block';
 carregarItens();
}else alert('Login inválido');
}

function addItem(){
let nome=nomeItem.value;
let preco=precoItem.value;
let img=imgItem.value;
let categoria=categoriaItem.value;

if(!nome||!preco)return alert('Preencha nome e preço');

 db.ref('cardapio').push({nome,preco,img,categoria});

 nomeItem.value='';precoItem.value='';imgItem.value='';
}

function carregarItens(){
let lista=document.getElementById('lista');
let filtro=document.getElementById('filtro').value;

 db.ref('cardapio').on('value',snap=>{
  lista.innerHTML='';
  snap.forEach(c=>{
   let id=c.key;
   let item=c.val();

   if(filtro && item.categoria!==filtro)return;

   lista.innerHTML+=`
   <div class="item">
    <div class="flex">
      <div>
        <b>${item.nome}</b><br>
        <span class="small">R$ ${item.preco} | ${item.categoria}</span>
      </div>
      ${item.img ? `<img src="${item.img}">` : ''}
    </div>

    <button onclick="editar('${id}','${item.nome}','${item.preco}','${item.img||''}','${item.categoria}')">Editar</button>
    <button onclick="remover('${id}')">Excluir</button>
   </div>`;
  });
 });
}

function remover(id){
 if(confirm('Excluir item?')){
  db.ref('cardapio/'+id).remove();
 }
}

function editar(id,nome,preco,img,categoria){
 let novoNome=prompt('Nome:',nome);
 let novoPreco=prompt('Preço:',preco);
 let novaImg=prompt('Imagem URL:',img);
 let novaCategoria=prompt('Categoria:',categoria);

 db.ref('cardapio/'+id).update({
  nome:novoNome,
  preco:novoPreco,
  img:novaImg,
  categoria:novaCategoria
 });
}
</script>

</body>
</html>
